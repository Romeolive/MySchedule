<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Расписание</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
font-family:system-ui;
margin:0;
background:#f3f6fb;
}

.auth{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

.card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
width:320px;
}

input{
width:100%;
padding:10px;
margin-top:6px;
margin-bottom:12px;
border-radius:8px;
border:1px solid #ddd;
}

button{
padding:10px 12px;
border:none;
border-radius:10px;
cursor:pointer;
background:#0f6aa8;
color:white;
}

button.secondary{
background:#eee;
color:#333;
}

.app{
padding:40px;
max-width:900px;
margin:auto;
}

.event{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:10px;
border:1px solid #ddd;
}

</style>
</head>

<body>

<div id="auth" class="auth">
<div class="card">

<h2>Вход</h2>

<label>Email</label>
<input id="email" type="email">

<label>Пароль</label>
<input id="password" type="password">

<button id="register">Регистрация</button>
<button class="secondary" id="login">Войти</button>

<p id="authStatus"></p>

</div>
</div>

<div id="app" class="app" style="display:none">

<h2>Моё расписание</h2>

<button id="logout">Выйти</button>
<button id="add">Добавить событие</button>

<div id="events"></div>

</div>

<script>

const SUPABASE_URL = "https://ezvttsxoecaiiitfublh.supabase.co"
const SUPABASE_KEY = "sb_publishable_Qo37PWiuwljqolAzcCb6DQ_pqF6aeVm"

const sb = supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

const authBlock = document.getElementById("auth")
const appBlock = document.getElementById("app")
const eventsBlock = document.getElementById("events")

async function register(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await sb.auth.signUp({email,password})

if(error){
document.getElementById("authStatus").innerText = error.message
return
}

document.getElementById("authStatus").innerText = "Проверь email для подтверждения"

}

async function login(){

const email = document.getElementById("email").value
const password = document.getElementById("password").value

const {error} = await sb.auth.signInWithPassword({email,password})

if(error){
document.getElementById("authStatus").innerText = error.message
}

}

async function logout(){
await sb.auth.signOut()
}

async function loadEvents(){

const {data,error} = await sb
.from("events")
.select("*")

if(error){
alert(error.message)
return
}

eventsBlock.innerHTML=""

data.forEach(e=>{

const div=document.createElement("div")
div.className="event"

div.innerHTML=`
<b>${e.title}</b><br>
${e.start} — ${e.end}<br>
${e.type}
`

eventsBlock.appendChild(div)

})

}

async function addEvent(){

const title = prompt("Название")
if(!title)return

const start = prompt("Начало (например 10:00)")
const end = prompt("Конец")

const {data:{user}} = await sb.auth.getUser()

await sb.from("events").insert({

user_id:user.id,
title,
start,
end,
mode:"tasks",
type:"Событие",
place:"",
person:"",
note:"",
dow:1

})

loadEvents()

}

sb.auth.onAuthStateChange(async(event,session)=>{

if(session){

authBlock.style.display="none"
appBlock.style.display="block"

loadEvents()

}else{

authBlock.style.display="flex"
appBlock.style.display="none"

}

})

document.getElementById("register").onclick = register
document.getElementById("login").onclick = login
document.getElementById("logout").onclick = logout
document.getElementById("add").onclick = addEvent

</script>

</body>
</html>
